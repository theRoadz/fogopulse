[toolchain]
package_manager = "pnpm"
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

# Note: Anchor doesn't support custom cluster names like "fogo-testnet"
# We use localnet as a placeholder and deploy using solana program deploy directly
[programs.localnet]
fogopulse = "D8htKqaQPp8g3VRpbwno1rCQcaBrMCbZZcaFVxSyDsX5"

# Alias for FOGO testnet deployments
[programs.devnet]
fogopulse = "D8htKqaQPp8g3VRpbwno1rCQcaBrMCbZZcaFVxSyDsX5"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/fogo-testnet.json"

[scripts]
# Integration tests (requires WALLET_PATH env var and network access):
# test = "pnpm ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.test.ts"
#
# Rust unit tests only (no network required):
test = "cargo test --manifest-path programs/fogopulse/Cargo.toml"
